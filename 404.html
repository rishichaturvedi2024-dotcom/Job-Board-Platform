<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
        (function () {
            var parts = window.location.pathname.split('/').filter(Boolean);
            var repoBase = parts.length > 0 ? '/' + parts[0] : '';
            var appPath = window.location.pathname.indexOf(repoBase) === 0
                ? window.location.pathname.slice(repoBase.length)
                : window.location.pathname;
            var target = repoBase + '/index.html#' + appPath + window.location.search + window.location.hash;
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p>Redirecting to the application...</p>
</body>
</html>
